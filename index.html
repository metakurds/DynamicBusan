<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>DynamicBusan · 해양물류 허브 착한맛지도</title>
  </head>
<body>
<script>
// --- 기존 변수 및 초기화 로직 유지 ---

// [수정됨] 1. 안전하게 Client ID를 백엔드에서 가져와 네이버 지도 로드
async function loadNaverSecured() {
  try {
    const res = await fetch('/.netlify/functions/get-client-id');
    const data = await res.json();
    
    const s = document.createElement('script'); 
    s.src = `https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=${data.clientId}`; 
    s.onload = () => { naverLoaded = true; initNaver(); }; 
    document.head.appendChild(s);
  } catch (err) {
    initDemo('네이버 지도 API 연동 실패. 서버 설정을 확인하세요.');
  }
}

// [수정됨] 2. 식당 제보 백엔드 전송 로직
async function addItem(){
  const name = $('name').value.trim();
  const address = $('addr').value.trim();
  
  if(!name || !address){
    alert('식당명과 주소는 필수 입력 사항입니다.');
    return;
  }
  
  const payload = {
    name: name,
    address: address,
    menu: $('menu').value,
    tag: $('tag').value,
    year: $('year').value,
    lat: $('lat').value,
    lng: $('lng').value,
    note: $('note').value,
    requestDate: new Date().toISOString() // 일자별 데이터 저장을 위한 타임스탬프
  };

  try {
    const response = await fetch('/.netlify/functions/submit-req', {
      method: 'POST',
      body: JSON.stringify(payload)
    });

    if(response.ok) {
      alert(`[DynamicBusan 알림]\n'${name}' 제보가 서버로 전송되었습니다.\n관리자 승인 후 정식 등록됩니다.`);
      // 폼 초기화 로직
    } else {
      alert('서버 오류로 제보에 실패했습니다.');
    }
  } catch(e) {
    alert('네트워크 오류가 발생했습니다.');
  }
}

// 로드 실행
loadNaverSecured();
</script>
</body>
</html>
